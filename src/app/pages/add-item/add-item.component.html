<div class="min-h-screen bg-slate-50 flex items-start justify-center pt-12 pb-12 px-4">

  <div class="w-full max-w-lg">

    <!-- Back context -->
    <div class="flex items-center gap-2 mb-6">
      <div class="w-8 h-8 bg-amber-400 rounded-lg flex items-center justify-center">
        <mat-icon style="font-size:18px; width:18px; height:18px; color:#1c1917;">inventory</mat-icon>
      </div>
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Item Management</span>
      <mat-icon class="text-slate-400" style="font-size:14px; width:14px; height:14px;">chevron_right</mat-icon>
      <span class="text-xs font-semibold text-slate-800 uppercase tracking-widest">New Item</span>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="h-1 bg-gradient-to-r from-amber-400 to-amber-500"></div>

      <div class="p-8">
        <div class="mb-7">
          <h1 class="text-2xl font-bold text-slate-900" style="font-family:'Syne',sans-serif;">Add New Item</h1>
          <p class="text-slate-500 text-sm mt-1">Fill in the details to add an item to the inventory</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="addItem()">

          <div class="mb-1">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Item Details</p>
          </div>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Item Name</mat-label>
            <input matInput formControlName="naziv" placeholder="Enter item name" />
            <mat-icon matPrefix class="mr-2 text-slate-400">label</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Type / Category</mat-label>
            <input matInput formControlName="type" placeholder="e.g. Electronics, Apparel..." />
            <mat-icon matPrefix class="mr-2 text-slate-400">category</mat-icon>
          </mat-form-field>

          <div class="grid grid-cols-2 gap-3">
            <mat-form-field appearance="outline" class="w-full">
              <mat-label>Weight (kg)</mat-label>
              <input matInput type="number" formControlName="weight" placeholder="0.00" />
              <mat-icon matPrefix class="text-slate-400">fitness_center</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
              <mat-label>Price ($)</mat-label>
              <input matInput type="number" formControlName="price" placeholder="0.00" />
              <mat-icon matPrefix class="text-slate-400">attach_money</mat-icon>
            </mat-form-field>
          </div>

          <div class="mt-4 mb-1">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Stock Limits</p>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <mat-form-field appearance="outline" class="w-full">
              <mat-label>Max Amount</mat-label>
              <input matInput type="number" formControlName="maxAmount" placeholder="Maximum stock" />
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
              <mat-label>Min Amount</mat-label>
              <input matInput type="number" formControlName="minAmount" placeholder="Minimum stock" />
            </mat-form-field>
          </div>

          <button type="submit" [disabled]="!form.valid" class="btn-form-submit mt-6">
            <mat-icon style="font-size:18px; width:18px; height:18px;">add_circle</mat-icon>
            Add Item
          </button>

        </form>
      </div>
    </div>

  </div>
</div>
