<div class="min-h-screen bg-slate-50 flex items-start justify-center pt-6 sm:pt-12 pb-12 px-4">

  <div class="w-full max-w-lg">

    <!-- Context breadcrumb -->
    <div class="breadcrumb-row mb-6">
      <div class="w-8 h-8 bg-amber-400 rounded-lg flex items-center justify-center">
        <mat-icon style="font-size:18px; width:18px; height:18px; color:#1c1917;">people</mat-icon>
      </div>
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest"><span class="hidden sm:inline">User </span>Management</span>
      <mat-icon class="text-slate-400" style="font-size:14px; width:14px; height:14px;">chevron_right</mat-icon>
      <span class="text-xs font-semibold text-slate-800 uppercase tracking-widest">Edit User</span>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="h-1 bg-gradient-to-r from-slate-600 to-slate-700"></div>

      <div class="p-6 sm:p-8">
        <div class="mb-7">
          <h1 class="text-2xl font-bold text-slate-900" style="font-family:'Syne',sans-serif;">Edit User</h1>
          <p class="text-slate-500 text-sm mt-1">Update the details and roles for this user</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="updateItem()">

          <!-- Account Info -->
          <div class="mb-1">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Account</p>
          </div>

          <mat-form-field appearance="outline" class="w-full mb-4">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" placeholder="User email" />
            <mat-icon matPrefix class="mr-2 text-slate-400">email</mat-icon>
          </mat-form-field>

          <!-- Roles -->
          <div class="mt-4 mb-4">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Roles & Permissions</p>
            <div class="flex flex-col sm:flex-row flex-wrap gap-3 sm:gap-4 bg-slate-50 rounded-xl p-4 border border-slate-200">
              <label class="flex items-center gap-3 cursor-pointer group">
                <div class="relative">
                  <input type="checkbox" formControlName="admin" [checked]="user?.roles?.includes('Admin')"
                    class="sr-only peer" />
                  <div class="w-5 h-5 bg-white border-2 border-slate-300 rounded peer-checked:bg-amber-400 peer-checked:border-amber-400 transition-all flex items-center justify-center">
                    <mat-icon class="hidden peer-checked:block text-white" style="font-size:12px; width:12px; height:12px;">check</mat-icon>
                  </div>
                </div>
                <div>
                  <div class="text-sm font-semibold text-slate-700">Admin</div>
                  <div class="text-xs text-slate-400">Full system access</div>
                </div>
              </label>

              <label class="flex items-center gap-3 cursor-pointer group">
                <div class="relative">
                  <input type="checkbox" formControlName="warehouseman" [checked]="user?.roles?.includes('Warehouseman')"
                    class="sr-only peer" />
                  <div class="w-5 h-5 bg-white border-2 border-slate-300 rounded peer-checked:bg-amber-400 peer-checked:border-amber-400 transition-all flex items-center justify-center">
                    <mat-icon class="hidden peer-checked:block text-white" style="font-size:12px; width:12px; height:12px;">check</mat-icon>
                  </div>
                </div>
                <div>
                  <div class="text-sm font-semibold text-slate-700">Warehouseman</div>
                  <div class="text-xs text-slate-400">Item management</div>
                </div>
              </label>

              <label class="flex items-center gap-3 cursor-pointer group">
                <div class="relative">
                  <input type="checkbox" formControlName="manager" [checked]="user?.roles?.includes('Manager')"
                    class="sr-only peer" />
                  <div class="w-5 h-5 bg-white border-2 border-slate-300 rounded peer-checked:bg-amber-400 peer-checked:border-amber-400 transition-all flex items-center justify-center">
                    <mat-icon class="hidden peer-checked:block text-white" style="font-size:12px; width:12px; height:12px;">check</mat-icon>
                  </div>
                </div>
                <div>
                  <div class="text-sm font-semibold text-slate-700">Manager</div>
                  <div class="text-xs text-slate-400">Inventory oversight</div>
                </div>
              </label>
            </div>
          </div>

          <!-- Personal Info -->
          <div class="mb-1">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Personal Information</p>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <mat-form-field appearance="outline" class="w-full mb-4">
              <mat-label>First Name</mat-label>
              <input matInput formControlName="firstName" placeholder="First name" />
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full mb-4">
              <mat-label>Last Name</mat-label>
              <input matInput formControlName="lastName" placeholder="Last name" />
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline" class="w-full mb-4">
            <mat-label>Address</mat-label>
            <input matInput formControlName="address" placeholder="Address" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full mb-4">
            <mat-label>Salary ($)</mat-label>
            <input matInput type="number" formControlName="salary" placeholder="Salary" />
            <mat-icon matPrefix class="mr-2 text-slate-400">attach_money</mat-icon>
          </mat-form-field>

          <button type="submit" [disabled]="!form.valid" class="btn-form-submit mt-2">
            <mat-icon style="font-size:18px; width:18px; height:18px;">save</mat-icon>
            Save Changes
          </button>

        </form>
      </div>
    </div>

  </div>
</div>
