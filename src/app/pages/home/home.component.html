<div class="min-h-screen bg-slate-50">

  <!-- Hero Header -->
  <div class="relative overflow-hidden bg-slate-950" style="min-height: 260px;">
    <!-- Subtle grid -->
    <div class="absolute inset-0 opacity-10"
      style="background-image: linear-gradient(#94a3b8 1px, transparent 1px), linear-gradient(90deg, #94a3b8 1px, transparent 1px); background-size: 48px 48px;">
    </div>
    <!-- Amber glow -->
    <div class="absolute top-0 right-0 w-96 h-96 rounded-full opacity-10"
      style="background: radial-gradient(circle, #f59e0b 0%, transparent 70%); transform: translate(30%, -30%);">
    </div>

    <div class="relative max-w-5xl mx-auto px-4 sm:px-8 py-10 sm:py-16 text-white">
      <div class="flex items-center gap-3 mb-6 sm:mb-8">
        <div class="w-10 h-10 sm:w-12 sm:h-12 bg-amber-400 rounded-xl flex items-center justify-center shadow-xl flex-shrink-0">
          <mat-icon style="font-size:22px; width:22px; height:22px; color:#1c1917;">inventory_2</mat-icon>
        </div>
        <div>
          <div class="text-amber-400 text-xs font-semibold tracking-widest uppercase">Enterprise System</div>
          <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight leading-none" style="font-family:'Syne',sans-serif;">
            Inventory Management
          </h1>
        </div>
      </div>

      @if(authService.getUserDetail()) {
        <div class="inline-flex items-center gap-3 bg-white/10 backdrop-blur-sm border border-white/10 rounded-xl px-4 sm:px-5 py-3 mt-2">
          <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse flex-shrink-0"></div>
          <div>
            <div class="text-slate-300 text-xs">Signed in as</div>
            <div class="text-white font-semibold text-sm break-all">{{authService.getUserDetail()?.email}}</div>
          </div>
        </div>
      } @else {
        <div class="flex flex-col items-start gap-4 mt-4">
          <div class="flex items-center gap-2 text-slate-400">
            <mat-icon style="font-size:16px; width:16px; height:16px;">info</mat-icon>
            <span class="text-sm">You are not signed in</span>
          </div>
          <a routerLink="/login" class="btn-primary no-underline">
            <mat-icon style="font-size:17px; width:17px; height:17px;">login</mat-icon>
            Sign In to Continue
          </a>
        </div>
      }
    </div>
  </div>

  <!-- Navigation Cards -->
  <div class="max-w-5xl mx-auto px-4 sm:px-8 py-8 sm:py-10">
    <div class="flex items-center gap-2 mb-5">
      <div class="w-1 h-4 bg-amber-400 rounded-full"></div>
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Quick Access</span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

      <button *ngIf="isAdmin() || isWarehouseman()"
              [routerLink]="['/items']"
              class="group bg-white border border-slate-200 rounded-xl p-5 sm:p-6 text-left hover:border-amber-300 hover:shadow-lg transition-all duration-200 cursor-pointer w-full">
        <div class="flex items-start gap-4">
          <div class="w-11 h-11 sm:w-12 sm:h-12 bg-slate-100 group-hover:bg-amber-50 rounded-xl flex items-center justify-center transition-colors flex-shrink-0">
            <mat-icon class="text-slate-600 group-hover:text-amber-600 transition-colors"
              style="font-size:22px; width:22px; height:22px;">inventory</mat-icon>
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-slate-900 text-base" style="font-family:'Syne',sans-serif;">Browse Items</div>
            <div class="text-slate-500 text-sm mt-0.5">View, edit and manage all stock items</div>
          </div>
          <mat-icon class="text-slate-300 group-hover:text-amber-400 transition-colors flex-shrink-0 mt-1"
            style="font-size:18px; width:18px; height:18px;">arrow_forward</mat-icon>
        </div>
      </button>

      <button *ngIf="isAdmin() || isManager()"
              [routerLink]="['/inventories']"
              class="group bg-white border border-slate-200 rounded-xl p-5 sm:p-6 text-left hover:border-amber-300 hover:shadow-lg transition-all duration-200 cursor-pointer w-full">
        <div class="flex items-start gap-4">
          <div class="w-11 h-11 sm:w-12 sm:h-12 bg-slate-100 group-hover:bg-amber-50 rounded-xl flex items-center justify-center transition-colors flex-shrink-0">
            <mat-icon class="text-slate-600 group-hover:text-amber-600 transition-colors"
              style="font-size:22px; width:22px; height:22px;">storage</mat-icon>
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-slate-900 text-base" style="font-family:'Syne',sans-serif;">Manage Inventory</div>
            <div class="text-slate-500 text-sm mt-0.5">Track locations, stock levels and shipments</div>
          </div>
          <mat-icon class="text-slate-300 group-hover:text-amber-400 transition-colors flex-shrink-0 mt-1"
            style="font-size:18px; width:18px; height:18px;">arrow_forward</mat-icon>
        </div>
      </button>

    </div>
  </div>

</div>
