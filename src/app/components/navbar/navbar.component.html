<div class="navbar-shell">
  <mat-toolbar class="custom-toolbar">

    <!-- Left: Menu + Brand -->
    <div class="flex items-center gap-3">
      <button mat-icon-button [matMenuTriggerFor]="mainMenu" class="menu-trigger">
        <mat-icon>menu</mat-icon>
      </button>

      <mat-menu #mainMenu="matMenu" class="nav-menu">
        <button *ngIf="isAdmin() || isManager()" mat-menu-item [routerLink]="['/items']">
          <mat-icon>inventory</mat-icon>
          <span>Items</span>
        </button>
        <button *ngIf="isAdmin() || isWarehouseman()" mat-menu-item [routerLink]="['/inventories']">
          <mat-icon>storage</mat-icon>
          <span>Inventories</span>
        </button>
        <button *ngIf="isAdmin()" mat-menu-item [routerLink]="['/shipmentorders']">
          <mat-icon>local_shipping</mat-icon>
          <span>Shipment Orders</span>
        </button>
        <button *ngIf="isAdmin()" mat-menu-item [routerLink]="['/analyze']">
          <mat-icon>bar_chart</mat-icon>
          <span>Analytics</span>
        </button>
        <button *ngIf="isAdmin()" mat-menu-item [routerLink]="['/stock']">
          <mat-icon>list_alt</mat-icon>
          <span>Take Stock</span>
        </button>
        <button *ngIf="isAdmin()" mat-menu-item [routerLink]="['/users']">
          <mat-icon>group</mat-icon>
          <span>Users</span>
        </button>
        <button *ngIf="isAdmin()" mat-menu-item [routerLink]="['/bills']">
          <mat-icon>receipt_long</mat-icon>
          <span>Bills</span>
        </button>
      </mat-menu>

      <a routerLink="/" class="brand-link">
        <div class="brand-icon">
          <mat-icon>inventory_2</mat-icon>
        </div>
        <span class="brand-name">StockOps</span>
      </a>
    </div>

    <div class="flex-1"></div>

    <!-- Right: User or Auth links -->
    @if(isLoggedIn()) {
      <div *ngIf="authService.getUserDetail() as userDetail">
        <a [matMenuTriggerFor]="menu" class="user-chip">
          <div class="user-avatar">
            {{ userDetail!.email[0].toUpperCase() }}
          </div>
          <div class="user-info">
            <span class="user-email">{{ userDetail?.email }}</span>
            <span class="user-role">{{ userDetail?.roles }}</span>
          </div>
          <mat-icon class="chevron">expand_more</mat-icon>
        </a>
        <mat-menu #menu="matMenu">
          <button (click)="logout()" mat-menu-item>
            <mat-icon>exit_to_app</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </div>
    } @else {
      <div class="flex items-center gap-2">
        <a mat-button routerLink="/login"     class="nav-auth-btn">Login</a>
        <a mat-button routerLink="/register"  class="nav-auth-btn register">Register</a>
      </div>
    }

  </mat-toolbar>
</div>
